group "com.scottlogic.hackathon"
version "1.0-SNAPSHOT"

wrapper {
    gradleVersion = "5.3.1"
    distributionType = Wrapper.DistributionType.ALL
}

subprojects {
    pluginManager.withPlugin('java') {
        ext{
            slf4jVersion = '1.7.12'
        }

        repositories {
            jcenter()
        }

        sourceCompatibility = 8
    }
}
