plugins {
    id 'groovy'
}

sourceSets {
    nexus
    server
    gitea
}

ext {
    nexusVersion = '3.13.0-01'
    nexusDistDir = file("$buildDir/docker/nexus")
    serverDistDir = file("$buildDir/docker/server")
    giteaDistDir = file("$buildDir/docker/gitea")
}

dependencies {
    nexusCompile "org.sonatype.nexus:nexus-script:${nexusVersion}"
    nexusCompile "org.sonatype.nexus:nexus-rest-client:${nexusVersion}"
    nexusCompile "org.sonatype.nexus:nexus-security:${nexusVersion}"
    nexusCompile 'org.apache.httpcomponents:httpclient:4.5.6'

    nexusRuntime "org.sonatype.nexus:nexus-rest-jackson2:${nexusVersion}"
    nexusRuntime "org.slf4j:slf4j-simple:1.7.+"

    nexusCompile "org.sonatype.nexus:nexus-repository:${nexusVersion}"
    nexusCompile "org.sonatype.nexus:nexus-blobstore:${nexusVersion}"
    nexusCompile "org.sonatype.nexus:nexus-core:${nexusVersion}"
    nexusCompile "org.sonatype.nexus.plugins:nexus-blobstore-tasks:${nexusVersion}"
    nexusCompile "org.sonatype.nexus.plugins:nexus-repository-maven:${nexusVersion}"
    nexusCompile "org.sonatype.nexus.plugins:nexus-script-plugin:${nexusVersion}"

    serverRuntime project(path: ':server', configuration: 'shadow')
    
    giteaRuntime project(path: ':contestant', configuration: 'repo')
}

task ('gatherNexus', type: Sync) {
    destinationDir = nexusDistDir
    from(configurations.nexusRuntime) {
        into 'jars'
        exclude 'groovy-*'
    }
    from(file("src/nexus"))
}

task ('gatherGitea', type: Sync) {
    destinationDir = giteaDistDir
    from(configurations.giteaRuntime) {
        into 'repo'
    }
    from(file("src/gitea"))
}

task ('gatherServer', type: Sync) {
    destinationDir = serverDistDir
    from(configurations.serverRuntime) {
        into 'jars'
    }
    from(rootDir) {
        into 'conf'
        include 'server.yml'
    }
    from(file("src/server"))
}

task up(type: Exec) {
    dependsOn gatherNexus, gatherServer, gatherGitea
    workingDir = projectDir
    commandLine 'docker-compose', 'up', '-d', '--build'
}

task down(type: Exec) {
    workingDir = projectDir
    commandLine 'docker-compose', 'down'
}
up.mustRunAfter down

task logs(type: Exec) {
    workingDir = projectDir
    commandLine 'docker-compose', 'logs'
}
