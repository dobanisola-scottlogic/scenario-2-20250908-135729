AWSTemplateFormatVersion: '2010-09-09'
Description: Cluster, containers, and databases for the hackathon AI game
Parameters:
  StackName:
    Type: String
    Description: The name of the parent Fargate networking stack that you created. Necessary
      to locate and reference resources created by that stack.
  ServiceName:
    Type: String
    Default: hackathon-server
    Description: A name for the service
  ContainerPort:
    Type: Number
    Default: 8080
    Description: What port number the application inside the docker container is binding to
  ContainerCpu:
    Type: Number
    Default: 4096
    Description: How much CPU to give the container. 1024 is 1 CPU
  ContainerMemory:
    Type: Number
    Default: 8192
    Description: How much memory in megabytes to give the container
  Priority:
    Type: Number
    Default: 1
    Description: The priority for the routing rule added to the load balancer.
      This only applies if your have multiple services which have been
      assigned to different paths on the load balancer.
  DBName:
    Type: String
    Default: hackathon
    Description: The name of the database to create and link to
  DBUser:
    Type: String
    Default: hackathon
    Description: The username to run the database as
    MinLength: 1
    MaxLength: 128
  DBPassword:
    Type: String
    Description: The password for the database user
    NoEcho: true
    MinLength: 8
    MaxLength: 128

Resources:

  # ECS Resources
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref 'AWS::StackName'

  # The task definition. This is a simple metadata description of what
  # container to run, and what resource requirements it has.
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref 'ServiceName'
      Cpu: !Ref 'ContainerCpu'
      Memory: !Ref 'ContainerMemory'
      NetworkMode: awsvpc
      RequiresCompatibilities:
      - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'ECSTaskExecutionRole']]
      ContainerDefinitions:
      - Name: !Ref 'ServiceName'
        Cpu: !Ref 'ContainerCpu'
        Memory: !Ref 'ContainerMemory'
        Image: '600982866784.dkr.ecr.eu-west-2.amazonaws.com/hackathon-server'
        PortMappings:
        - ContainerPort: !Ref 'ContainerPort'
        Environment:
          - Name: DB_NAME
            Value: !Ref 'DBName'
          - Name: DB_TYPE
            Value: postgres
          - Name: DB_HOST
            Value: !GetAtt Database.Endpoint.Address
          - Name: DB_PORT
            Value: !GetAtt Database.Endpoint.Port
          - Name: DB_USER
            Value: !Ref 'DBUser'
          - Name: DB_PASSWORD
            Value: !Ref 'DBPassword'
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group:
              Fn::ImportValue:
                !Join [':', [!Ref 'StackName', 'LogGroup']]
            awslogs-region: !Ref 'AWS::Region'
            awslogs-stream-prefix: !Ref 'ServiceName'

  # The service. The service is a resource which allows you to run multiple
  # copies of a type of task, and gather up their logs and metrics, as well
  # as monitor the number of running tasks and replace any that have crashed
  Service:
    Type: AWS::ECS::Service
    DependsOn:
    - LoadBalancerRule
    - Database
    Properties:
      ServiceName: !Ref 'ServiceName'
      Cluster: !Ref 'ECSCluster'
      LaunchType: FARGATE
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
          - Fn::ImportValue:
              !Join [':', [!Ref 'StackName', 'FargateContainerSecurityGroup']]
          Subnets:
          - Fn::ImportValue:
              !Join [':', [!Ref 'StackName', 'PrivateSubnetOne']]
          - Fn::ImportValue:
              !Join [':', [!Ref 'StackName', 'PrivateSubnetTwo']]
      TaskDefinition: !Ref 'TaskDefinition'
      LoadBalancers:
      - ContainerName: !Ref 'ServiceName'
        ContainerPort: !Ref 'ContainerPort'
        TargetGroupArn: !Ref 'TargetGroup'

  # A target group. This is used for keeping track of all the tasks, and
  # what IP addresses / port numbers they have. You can query it yourself,
  # to use the addresses yourself, but most often this target group is just
  # connected to an application load balancer, or network load balancer, so
  # it can automatically distribute traffic across all the targets.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 6
      HealthCheckPath: "/admin/healthcheck"
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      TargetType: ip
      Name: !Ref 'ServiceName'
      Port: !Ref 'ContainerPort'
      Protocol: HTTP
      UnhealthyThresholdCount: 2
      VpcId:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'VPCId']]

  # Create a rule on the load balancer for routing traffic to the target group
  LoadBalancerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
      - TargetGroupArn: !Ref 'TargetGroup'
        Type: 'forward'
      Conditions:
      - Field: path-pattern
        Values: ["/application*"]
      ListenerArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'PublicListener']]
      Priority: !Ref 'Priority'

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: VPC subnets for the database
      SubnetIds:
        - Fn::ImportValue:
            !Join [':', [!Ref 'StackName', 'PrivateSubnetOne']]
        - Fn::ImportValue:
            !Join [':', [!Ref 'StackName', 'PrivateSubnetTwo']]

#  DBSecurityGroup:
#    Type: AWS::EC2::SecurityGroup
#    Properties:
#      GroupDescription: Open database for access
#      SecurityGroupIngress:
#      - IpProtocol: tcp
#        FromPort: '5432'
#        ToPort: '5432'
#        SourceSecurityGroupName:
#          Fn::ImportValue:
#            !Join [':', [!Ref 'StackName', 'PrivateSubnet2']]

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      DBInstanceClass: db.t2.micro
      AllocatedStorage: 5
      AutoMinorVersionUpgrade: true
      DBName: !Ref 'DBName'
      MasterUsername: !Ref 'DBUser'
      MasterUserPassword: !Ref 'DBPassword'
      DBSubnetGroupName: !Ref 'DBSubnetGroup'
      VPCSecurityGroups:
        - Fn::ImportValue:
            !Join [':', [!Ref 'StackName', 'FargateContainerSecurityGroup']]
