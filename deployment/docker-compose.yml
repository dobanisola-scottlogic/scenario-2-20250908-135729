version: '3.7'

volumes:
  database:

services:

  database:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: hackathon
      POSTGRES_USER: scottlogic
      POSTGRES_PASSWORD: hackathon
    volumes:
      - database:/var/lib/postgresql/data

  server:
    image: hackathon-gameserver
    depends_on:
      - database
    ports:
      - 8080:8080
    environment:
      DB_TYPE: postgres
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: hackathon
      DB_USER: scottlogic
      DB_PASSWORD: hackathon