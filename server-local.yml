server:
  type: simple
  maxThreads: 200
  connector:
    type: http
    port: 8080
  rootPath: '/api/*'
database:
  driverClass: org.h2.Driver
  url: jdbc:h2:file:./data/hackathon
  user: sa
  password:
  properties:
    hibernate.dialect: org.hibernate.dialect.MySQLDialect
    hibernate.hbm2ddl.auto: update
logging:
  level: INFO