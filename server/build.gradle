group "com.scottlogic.hackathon"
version "1.0-SNAPSHOT"

def mainClass = "com.scottlogic.hackathon.server.HackathonApplication"
def dropWizardVersion = "1.3.7"

ext {
    dockerImageName = 'hackathon-server'
    httpPort = '8080'
}

apply plugin: "application"

mainClassName = mainClass

configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if(details.requested.name == 'hibernate-core') {
            details.useVersion '5.3.6.Final'
            details.because 'Hibernate 5.3.3+ needed for Java 11 support'
        }
    }
}

dependencies {
    compile group: "io.dropwizard", name: "dropwizard-core", version: dropWizardVersion
    compile group: "io.dropwizard", name: "dropwizard-auth", version: dropWizardVersion
    compile group: "io.dropwizard", name: "dropwizard-assets", version: dropWizardVersion
    compile group: "io.dropwizard", name: "dropwizard-forms", version: dropWizardVersion
    compile group: "io.dropwizard", name: "dropwizard-hibernate", version: dropWizardVersion
    runtime 'javax.xml.bind:jaxb-api:2.3.1' // Needed by hibernate in Java 9+
    compile group: "com.google.inject", name: "guice", version: "3.0"
    runtime group: "org.postgresql", name: "postgresql", version: "9.4.1211"
    runtime group: "com.h2database", name: "h2", version: "1.4.197"
    runtime 'org.mariadb.jdbc:mariadb-java-client:2.3.0'
    compile project(":game")
    compile project(":game-engine")
    compile project(":default-bots")
    runtime project(path: ':viewer', configuration: 'archives')
}

jar {
    manifest {
        attributes(
                "Implementation-Title": "hackathon-server",
                "Implementation-Version": version,
                "Main-Class": mainClass
        )
    }
}

if(project.hasProperty('database')) {
    applicationDefaultJvmArgs += "-Ddw.database.url=jdbc:h2:${rootProject.file(project.database)}"
}

runShadow {
    args "server"
    args "..\\server.yml"
}

run {
    main mainClass
    args "server"
    args "..\\server.yml"
}

task('dockerBuildEnv', type: Sync) {

    into("$buildDir/docker")
    from('src/main/docker') {
        filter(org.apache.tools.ant.filters.FixCrLfFilter,
                eol: org.apache.tools.ant.filters.FixCrLfFilter.CrLf.newInstance('lf'))
        
        from('../server.yml') {
            into 'hackathon/conf'
        }
    }

    into('hackathon/libs') {
        from configurations[sourceSets.main.runtimeClasspathConfigurationName]
        from tasks[sourceSets.main.jarTaskName]
    }
}

task('dockerBuild', type: Exec) {
    inputs.properties(
            MAINTAINER: 'Scott Logic',
            PORT: project.httpPort,
            MAIN: mainClass
    )

    inputs.files(dockerBuildEnv)

    workingDir = dockerBuildEnv.destinationDir
    executable = 'docker'
    args 'build', '-t', project.dockerImageName, '.'

    doFirst {
        inputs.properties.each { k,v ->
            args '--build-arg', "${k}=${v}"
        }
    }

}

task('dockerRun', type: Exec) {
    dependsOn dockerBuild
    executable = 'docker'
    args 'run', '--rm', '-d',
            '-p', "${project.httpPort}:${project.httpPort}",
            '--name', project.dockerImageName,
            project.dockerImageName

    doLast {
        println "Docker container is now running. You can stop it with 'docker stop ${project.dockerImageName}'"
    }
}
