server:
  type: simple
  maxThreads: 200
  connector:
    type: http
    port: 8080
  rootPath: '/api/*'
database:
  # Database properties
  # In a real deployment, these should be overridden with system props
  driverClass: org.h2.Driver
  url: jdbc:h2:mem:hackathon
  properties:
    hibernate.dialect: org.hibernate.dialect.H2Dialect
    hibernate.hbm2ddl.auto: update
logging:
  appenders:
    # Log warnings and errors to stderr
    - type: console
      threshold: WARN
      target: stderr
    # Log info, warnings and errors to our apps' main log.
    # Rolled over daily and retained for 5 days.
    - type: file
      threshold: INFO
      currentLogFilename: ./logs/hackathon.log
      archivedLogFilenamePattern: ./logs/hackathon-%d.log.gz
      archivedFileCount: 5
      timeZone: UTC
    # Log debug messages, info, warnings and errors to our apps' debug log.
    # Rolled over hourly and retained for 6 hours
    - type: file
      threshold: DEBUG
      currentLogFilename: ./logs/debug.log
      archivedLogFilenamePattern: ./logs/debug-%d{yyyy-MM-dd-hh}.log.gz
      archivedFileCount: 6
