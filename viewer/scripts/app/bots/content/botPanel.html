<div class="botPanel">
    <form name="uploadForm">
        <div class="dropdown col-md-2">
            <button class="btn btn-default dropdown-toggle class-name-dropdown" ng-disabled="controller.botsInCurrentFile.length === 0" type="button" data-toggle="dropdown">
                Bots In Current File <span class="caret"></span>
            </button>
            <ul class="dropdown-menu">
                <li ng-if="controller.botsInCurrentFile.length === 0"><a>No bots found</a></li>
                <li ng-repeat="bot in controller.botsInCurrentFile" ng-click="controller.uploadBot(bot.className)">
                    <a>
                        <span>{{bot.displayName}}</span>
                    </a>
                </li>
            </ul>
        </div>

        <button
            ngf-select="controller.onSelectFile($file)"
            class="btn btn-default"
            name="file"
            ngf-max-size="10MB"
            ng-disabled="controller.userInterfaceDisabled"
            >Select File</button>
    </form>

    <div class="uploadedFileName">
        {{controller.uploadedFileName}}
    </div>

    <div class="botList">
        <hack-bot
            ng-repeat="bot in controller.bots track by bot.id"
            ng-click="controller.onBotSelected(bot)"
            ng-class="{'isSelected': controller.isSelected(bot)}"
            is-active="controller.isActive(bot)"
            bot="bot"></hack-bot>
    </div>

    <form name="actionForm">
        <button class="btn btn-default"
                ng-disabled="controller.editButtonsDisabled"
                ng-click="controller.onMakeActive(bot)">Make Active</button>
        <button class="btn btn-default"
                ng-disabled="controller.editButtonsDisabled"
                ng-click="controller.onDelete(bot)">Delete</button>
    </form>
</div>
