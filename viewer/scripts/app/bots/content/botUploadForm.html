<div class="botUploadForm">
    <div class="input-group">
        <select
            ng-options="bot.className as bot.displayName for bot in controller.botsInCurrentFile"
            ng-change="controller.upload()"
            ng-disabled="controller.selectBotDisabled"
            class="form-control"
            ng-model="controller.selectedBotInCurrentFile">
        </select>
        <span class="input-group-btn">
            <button
                ngf-select="controller.onSelectFile($file)"
                class="btn btn-default"
                name="file"
                ngf-max-size="10MB"
                ng-disabled="selectFileDisabled()">Select File
            </button>
        </span>
    </div>
    <h5 class="uploadedFileName"><small>{{controller.uploadedFileName}}</small></h5>
    <div class="spinner-container" ng-show="controller.makingCall">
        <div class="spinner"></div>
</div>
