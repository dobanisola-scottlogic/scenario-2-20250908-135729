    <div class="dashboardOverlay" ng-if="controller.isOpen">
        <div class="content">
            <div class="close" ng-click="controller.close()">X</div>
            <div class="titleText">{{title}}</div>

            <ng-transclude></<ng-transclude>
        <div>
    </div>
</div>
