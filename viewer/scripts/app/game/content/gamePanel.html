<div class="gamePanel">
    <alert
        ng-show="controller.alert"
        is-error="controller.alertIsError()"
        is-success="controller.alertIsSuccess()"
        close-alert="controller.refreshAlerts()"
        alert="controller.alert">
    </alert>
    <div class="input-group">
        <span class="input-group-addon">Hackathon</span>
        <select
            class="form-control"
            ng-model="controller.game.hackathonId"
            ng-options="hackathon.id as hackathon.name for hackathon in controller.hackathons"
            ng-disabled="controller.userInterfaceDisabled"
            ng-change="controller.onHackathonSelected()">
        </select>
    </div>
    <hack-hackathon-selector
        ng-model="controller.game.hackathonId"
        ng-disabled="controller.userInterfaceDisabled"
        on-change="controller.onHackathonSelected()">
    </hack-hackathon-selector>
    <hr></hr>
    <div class="input-group">
        <span class="input-group-addon">Map</span>
        <select
            class="form-control"
            ng-model="controller.game.map"
            ng-options="map.value as map.display for map in controller.maps"
            ng-disabled="controller.userInterfaceDisabled">
        </select>
    </div>
    <hr></hr>
    <div class="list-group">
        <button
            type="button"
            class="list-group-item"
            ng-class="{'active': controller.isTeamSelected(team)}"
            ng-repeat="team in controller.teams track by team.id"
            ng-click="controller.onTeamSelected(team)">{{team.name}}
        </button>
    </div>
    <button class="btn btn-default" ng-click="controller.refreshTeams()">Refresh Teams</button>
    <button
        class="btn btn-primary pull-right"
        ng-disabled="controller.addButtonDisabled"
        ng-click="controller.playGame()">Play Game
    </button>
    <div class="spinner-container" ng-show="controller.makingCall">
        <div class="spinner"></div>
    </div>
</div>
