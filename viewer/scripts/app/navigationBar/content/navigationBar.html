<div class="header">
    <div class="navbar-header col-md-1">
        <span class="navbar-brand">Hackathon</span>
    </div>
    <div class="dropdown games-div">
        <button class="btn btn-default dropdown-toggle games-dropdown" type="button" id="games" data-toggle="dropdown" aria-haspopup="true" aria-expanded="true">
            Available Games <span class="caret"></span>
        </button>
        <ul id="available-games" class="dropdown-menu" aria-labelledby="games">
            <li><a ng-click="controller.enableLiveMode()" ng-class="{'selected': controller.sharedPropertiesService.getLiveMode()}">Live</a></li>
            <li ng-if="controller.gamesList.length === 0"><a>No games found</a></li>
            <li ng-repeat="game in controller.gamesList | orderBy:'-game.gameTime' track by game.id" ng-click="controller.gameSelectedInDropdown(game)" ng-class="{'selected': game.id === controller.selectedGame.id}">
                <a>
                    <span>Map {{game.game.map.name}} - </span>
                    <span ng-repeat="team in game.game.teams | orderBy:'teamName' track by team.teamId">{{team.teamName}}{{$last ? '' : ' vs '}}</span>
                </a>
            </li>
        </ul>
    </div>
    <div class="teams col-md-4">
        <div class="col-md-3 team-list" ng-repeat="team in controller.teamList">
            <h4 ng-style="controller.getColour(team.botId)">{{team.teamName}}</h4>
        </div>
    </div>
    <form class="login"
          ng-show="!controller.isLoggedIn"
          ng-keyup="$event.keyCode === 13 && controller.login() || $event.keyCode !== 13 && controller.updateState()"
          novalidate>
        <div class="input-field name"
             ng-enter="controller.login()"
             ng-keyup="$event.keyCode !== 13 && controller.updateState()">
            <input id="team_name"
                   type="text"
                   ng-model="controller.credentials.username"
                   ng-class="controller.state === 3 ? 'invalid' : ''">
            <label for="team_name">Team Name</label>
        </div>
        <div class="input-field password">
            <input id="team_password"
                   type="password"
                   ng-model="controller.credentials.password"
                   ng-class="controller.state === 3 ? 'invalid' : ''">
            <label for="team_password">Password</label>
        </div>
        <a class="login-btn waves-effect btn"
           ng-click="controller.login()"
           ng-class="controller.isLoggingIn ? 'disabled' : ''"
           ng-disabled="controller.isLoggingIn">Login</a>
    </form>
    <div ng-if="controller.isLoggedIn">
        <hack-transclude></hack-transclude>
    </div>
    <div class="buttons" ng-if="controller.isLoggedIn">
        <div class="admin-buttons"
             ng-if="controller.isAdmin">
             <a class="waves-effect waves-light btn dashboard-open"
                ng-click="hackathonDashboardController.open()"
                ng-disabled="!controller.isLoggedIn"
                ng-if="controller.isLoggedIn">
                <span class="glyphicon glyphicon-certificate" aria-hidden="true"></span>
                 Hackathon
             </a>
            <a class="waves-effect waves-light btn dashboard-open"
               ng-click="gameDashboardController.open()"
               ng-disabled="!controller.isLoggedIn"
               ng-if="controller.isLoggedIn">
               <span class="glyphicon glyphicon-knight" aria-hidden="true"></span>
                Game
            </a>
            <a class="waves-effect waves-light btn dashboard-open"
               ng-click="teamDashboardController.open()"
               ng-disabled="!controller.isLoggedIn"
               ng-if="controller.isLoggedIn">
               <span class="glyphicon glyphicon-user" aria-hidden="true"></span>
                Team
            </a>
        </div>
        <div class="team-buttons"
             ng-if="!controller.isAdmin">
            <a class="waves-effect waves-light btn dashboard-open"
               ng-click="botDashboardController.open()"
               ng-disabled="!controller.isLoggedIn"
               ng-if="controller.isLoggedIn">
               <span class="glyphicon glyphicon-console" aria-hidden="true"></span>
                Dashboard
            </a>
        </div>
        <a class="logout-btn waves-effect btn"
           ng-click="controller.logout()"
           ng-if="controller.isLoggedIn">Logout</a>
    </div>
</div>
