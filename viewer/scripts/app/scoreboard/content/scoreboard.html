<div class="scoreboard" ng-show="controller.sharedPropertiesService.getSelectedGame()">
    <div class="game-info">
        <span class="map">Map <span class="badge">{{controller.getMapName()}}</span></span>
        <span class="teams"><span class="label" ng-repeat-start="team in controller.getTeams()" ng-style="controller.getColour(team.colour.HEX)">{{team.teamName}}</span><span ng-repeat-end>{{$last ? '' : ' vs '}}</span></span>
        <span class="pull-right"><span class="badge">{{controller.getGameTime() | date : 'MMM d, y h:mm:ss'}}</span></span>
    </div>
    <hr></hr>
</div>
