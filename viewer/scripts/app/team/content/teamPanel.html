<div class="teamPanel">
    <form>
        <label class="input-label" for="hackathon">Hackathon:</label>
        <select
            class="browser-default" id="hackathon"
            ng-model="controller.newTeamDetails.hackathonId"
            ng-options="hackathon.id as hackathon.name for hackathon in controller.hackathons"
            ng-disabled="controller.userInterfaceDisabled"
            ng-change="controller.onHackathonSelected()"
        ></select>
        <label class="input-label" for="username">Username:</label>
        <input class="text-input"
               type="text"
               id="username"
               ng-model="controller.newTeamDetails.name"
               ng-disabled="controller.userInterfaceDisabled">
        <label class="input-label" for="password">Password:</label>
        <input class="text-input"
               type="password"
               id="password"
               ng-model="controller.newTeamDetails.password"
               ng-disabled="controller.userInterfaceDisabled">
        <alert ng-show="controller.addTeamAlert"
               is-error="controller.alertIsError(controller.addTeamAlert)"
               is-success="controller.alertIsSuccess(controller.addTeamAlert)"
               close-alert="controller.refreshAlerts()"
               alert="controller.addTeamAlert">
        </alert>
        <button class="btn btn-default"
                ng-disabled="controller.addButtonDisabled"
                ng-click="controller.addNewTeam()">Add New Team
        </button>
    </form>

    <div class="teamList">
        <hack-team
                ng-if="controller.teams.length > 0"
                ng-repeat="team in controller.teams track by team.id"
                ng-click="controller.onTeamSelected(team)"
                ng-class="{'isSelected': controller.isSelected(team)}"
                team="team"></hack-team>
        <span ng-if="controller.teams.length === 0">No teams found.</span>
    </div>

    <div class="teamDetails">
        <div>Selected Team: {{controller.selectedTeam.name}}</div>
        <div>ID: {{controller.selectedTeam.id}}</div>
        <div>HackathonID: {{controller.selectedTeam.hackathonId}}</div>
        <div>
            <form>
                <label class="input-label" for="password">Password:</label>
                <input class="text-input"
                       type="text"
                       id="password"
                       ng-model="controller.updatePassword"
                       ng-disabled="controller.userInterfaceDisabled">
                <alert ng-show="controller.editTeamAlert"
                      is-error="controller.alertIsError(controller.editTeamAlert)"
                      is-success="controller.alertIsSuccess(controller.editTeamAlert)"
                      close-alert="controller.refreshAlerts()"
                      alert="controller.editTeamAlert">
                </alert>
                <button class="btn btn-default"
                        ng-click="controller.onUpdatePassword()"
                        ng-disabled="controller.updatePasswordButtonDisabled">Update Password
                </button>
                <button class="btn btn-default"
                        ng-click="controller.onDelete()"
                        ng-disabled="controller.deleteButtonDisabled">Delete Team
                </button>
            </form>
        </div>
    </div>
</div>
